<svg viewBox="0 0 820 300" xmlns="http://www.w3.org/2000/svg" style="font-family:'JetBrains Mono',monospace;">
  <title>L1 — Designing for Two Audiences: Humans AND AI Agents</title>
  <desc>Shows how design boundaries (bounded contexts, APIs, ACLs) serve both human comprehension and AI agent operation, with the domain model as the shared foundation.</desc>

  <rect width="820" height="300" rx="8" fill="#0a0e17"/>

  <text x="410" y="24" text-anchor="middle" font-size="11" fill="#a78bfa" font-weight="700" letter-spacing="1">L1 DESIGN THINKING — DESIGNING FOR TWO AUDIENCES</text>

  <!-- Human audience -->
  <rect x="40" y="50" width="340" height="200" rx="6" fill="#141b2d" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="210" y="72" text-anchor="middle" font-size="10" fill="#a78bfa" font-weight="700">HUMAN AUDIENCE 人类受众</text>

  <rect x="60" y="85" width="140" height="40" rx="4" fill="#0f1420" stroke="#1e2a45" stroke-width="0.5"/>
  <text x="130" y="100" text-anchor="middle" font-size="8" fill="#eab308" font-weight="600">GoF Patterns</text>
  <text x="130" y="114" text-anchor="middle" font-size="7" fill="#64748b">Cognitive shortcuts</text>

  <rect x="220" y="85" width="140" height="40" rx="4" fill="#0f1420" stroke="#1e2a45" stroke-width="0.5"/>
  <text x="290" y="100" text-anchor="middle" font-size="8" fill="#eab308" font-weight="600">Bounded Contexts</text>
  <text x="290" y="114" text-anchor="middle" font-size="7" fill="#64748b">Team ownership</text>

  <rect x="60" y="135" width="140" height="40" rx="4" fill="#0f1420" stroke="#1e2a45" stroke-width="0.5"/>
  <text x="130" y="150" text-anchor="middle" font-size="8" fill="#eab308" font-weight="600">API Contracts</text>
  <text x="130" y="164" text-anchor="middle" font-size="7" fill="#64748b">Integration docs</text>

  <rect x="220" y="135" width="140" height="40" rx="4" fill="#0f1420" stroke="#1e2a45" stroke-width="0.5"/>
  <text x="290" y="150" text-anchor="middle" font-size="8" fill="#eab308" font-weight="600">Domain Glossary</text>
  <text x="290" y="164" text-anchor="middle" font-size="7" fill="#64748b">Ubiquitous language</text>

  <text x="210" y="205" text-anchor="middle" font-size="8" fill="#94a3b8">Optimized for comprehension</text>
  <text x="210" y="220" text-anchor="middle" font-size="8" fill="#94a3b8">maintainability, onboarding</text>
  <text x="210" y="240" text-anchor="middle" font-size="9" fill="#a78bfa" font-weight="600">Classical goal: human understanding</text>

  <!-- AI audience -->
  <rect x="440" y="50" width="340" height="200" rx="6" fill="#141b2d" stroke="#22d3ee" stroke-width="1.2"/>
  <text x="610" y="72" text-anchor="middle" font-size="10" fill="#22d3ee" font-weight="700">AI AGENT AUDIENCE AI受众</text>

  <rect x="460" y="85" width="140" height="40" rx="4" fill="#0f1420" stroke="#1e2a45" stroke-width="0.5"/>
  <text x="530" y="100" text-anchor="middle" font-size="8" fill="#22d3ee" font-weight="600">AI-Native Patterns</text>
  <text x="530" y="114" text-anchor="middle" font-size="7" fill="#64748b">RAG, Tool-Use, HITL</text>

  <rect x="620" y="85" width="140" height="40" rx="4" fill="#0f1420" stroke="#1e2a45" stroke-width="0.5"/>
  <text x="690" y="100" text-anchor="middle" font-size="8" fill="#22d3ee" font-weight="600">Context Boundaries</text>
  <text x="690" y="114" text-anchor="middle" font-size="7" fill="#64748b">Per-context RAG KB</text>

  <rect x="460" y="135" width="140" height="40" rx="4" fill="#0f1420" stroke="#1e2a45" stroke-width="0.5"/>
  <text x="530" y="150" text-anchor="middle" font-size="8" fill="#22d3ee" font-weight="600">OpenAPI as Prompt</text>
  <text x="530" y="164" text-anchor="middle" font-size="7" fill="#64748b">Spec IS the AI guide</text>

  <rect x="620" y="135" width="140" height="40" rx="4" fill="#0f1420" stroke="#1e2a45" stroke-width="0.5"/>
  <text x="690" y="150" text-anchor="middle" font-size="8" fill="#22d3ee" font-weight="600">ACL as Guardrail</text>
  <text x="690" y="164" text-anchor="middle" font-size="7" fill="#64748b">AI output validation</text>

  <text x="610" y="205" text-anchor="middle" font-size="8" fill="#94a3b8">Optimized for parseability</text>
  <text x="610" y="220" text-anchor="middle" font-size="8" fill="#94a3b8">explicitness, machine reasoning</text>
  <text x="610" y="240" text-anchor="middle" font-size="9" fill="#22d3ee" font-weight="600">AI goal: reliable operation</text>

  <!-- Bridge -->
  <text x="410" y="135" text-anchor="middle" font-size="18" fill="#64748b">+</text>

  <!-- Bottom insight -->
  <rect x="150" y="262" width="520" height="28" rx="5" fill="#141b2d" stroke="#10b981" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="410" y="280" text-anchor="middle" font-size="9" fill="#10b981" font-weight="600">SAME principles, DUAL consumers — DDD rigor becomes MORE important, not less</text>
</svg>
