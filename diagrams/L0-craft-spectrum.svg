<svg viewBox="0 0 820 280" xmlns="http://www.w3.org/2000/svg" style="font-family:'JetBrains Mono',monospace;">
  <title>L0 — The Craft Spectrum: From Clean Code to AI-Readable Code</title>
  <desc>Six-stage code maturity model showing the evolution from spaghetti code to AI-generable code, with the transition point between pre-AI and AI-augmented eras.</desc>

  <rect width="820" height="280" rx="8" fill="#0a0e17"/>

  <text x="410" y="24" text-anchor="middle" font-size="11" fill="#22d3ee" font-weight="700" letter-spacing="1">L0 CODE CRAFT — THE CRAFT SPECTRUM</text>

  <!-- Spectrum bar -->
  <defs>
    <linearGradient id="sg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f43f5e"/>
      <stop offset="20%" stop-color="#f97316"/>
      <stop offset="40%" stop-color="#eab308"/>
      <stop offset="60%" stop-color="#22d3ee"/>
      <stop offset="80%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  <rect x="40" y="42" width="740" height="6" rx="3" fill="url(#sg)" opacity="0.7"/>

  <!-- Era labels -->
  <text x="210" y="38" text-anchor="middle" font-size="8" fill="#94a3b8" letter-spacing="1">PRE-AI ERA</text>
  <line x1="370" y1="32" x2="370" y2="48" stroke="#64748b" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="590" y="38" text-anchor="middle" font-size="8" fill="#22d3ee" letter-spacing="1">AI-AUGMENTED ERA</text>

  <!-- 6 Stages -->
  <rect x="20" y="60" width="120" height="100" rx="5" fill="#141b2d" stroke="#f43f5e" stroke-width="1"/>
  <circle cx="80" cy="78" r="10" fill="none" stroke="#f43f5e" stroke-width="1.5"/>
  <text x="80" y="82" text-anchor="middle" font-size="10" fill="#f43f5e" font-weight="700">1</text>
  <text x="80" y="100" text-anchor="middle" font-size="9.5" fill="#e2e8f0" font-weight="600">Spaghetti</text>
  <text x="80" y="114" text-anchor="middle" font-size="7" fill="#64748b">No structure</text>
  <text x="80" y="126" text-anchor="middle" font-size="7" fill="#64748b">God classes</text>
  <text x="80" y="150" text-anchor="middle" font-size="7" fill="#f43f5e">AI fails here ✗</text>

  <rect x="155" y="60" width="120" height="100" rx="5" fill="#141b2d" stroke="#f97316" stroke-width="1"/>
  <circle cx="215" cy="78" r="10" fill="none" stroke="#f97316" stroke-width="1.5"/>
  <text x="215" y="82" text-anchor="middle" font-size="10" fill="#f97316" font-weight="700">2</text>
  <text x="215" y="100" text-anchor="middle" font-size="9.5" fill="#e2e8f0" font-weight="600">Readable</text>
  <text x="215" y="114" text-anchor="middle" font-size="7" fill="#64748b">Good naming</text>
  <text x="215" y="126" text-anchor="middle" font-size="7" fill="#64748b">Consistent style</text>
  <text x="215" y="150" text-anchor="middle" font-size="7" fill="#f97316">AI struggles △</text>

  <rect x="290" y="60" width="120" height="100" rx="5" fill="#141b2d" stroke="#eab308" stroke-width="1"/>
  <circle cx="350" cy="78" r="10" fill="none" stroke="#eab308" stroke-width="1.5"/>
  <text x="350" y="82" text-anchor="middle" font-size="10" fill="#eab308" font-weight="700">3</text>
  <text x="350" y="100" text-anchor="middle" font-size="9.5" fill="#e2e8f0" font-weight="600">Clean</text>
  <text x="350" y="114" text-anchor="middle" font-size="7" fill="#64748b">SOLID, SRP</text>
  <text x="350" y="126" text-anchor="middle" font-size="7" fill="#64748b">Small functions</text>
  <text x="350" y="150" text-anchor="middle" font-size="7" fill="#eab308">AI works well ○</text>

  <rect x="425" y="60" width="120" height="100" rx="5" fill="#141b2d" stroke="#22d3ee" stroke-width="1"/>
  <circle cx="485" cy="78" r="10" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="485" y="82" text-anchor="middle" font-size="10" fill="#22d3ee" font-weight="700">4</text>
  <text x="485" y="100" text-anchor="middle" font-size="9.5" fill="#e2e8f0" font-weight="600">Self-Doc</text>
  <text x="485" y="114" text-anchor="middle" font-size="7" fill="#64748b">Intent-revealing</text>
  <text x="485" y="126" text-anchor="middle" font-size="7" fill="#64748b">Typed contracts</text>
  <text x="485" y="150" text-anchor="middle" font-size="7" fill="#22d3ee">AI excels here ◉</text>

  <rect x="560" y="60" width="120" height="100" rx="5" fill="#141b2d" stroke="#a78bfa" stroke-width="1"/>
  <circle cx="620" cy="78" r="10" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="620" y="82" text-anchor="middle" font-size="10" fill="#a78bfa" font-weight="700">5</text>
  <text x="620" y="100" text-anchor="middle" font-size="9.5" fill="#e2e8f0" font-weight="600">AI-Parseable</text>
  <text x="620" y="114" text-anchor="middle" font-size="7" fill="#64748b">.ai/ context dir</text>
  <text x="620" y="126" text-anchor="middle" font-size="7" fill="#64748b">OpenAPI specs</text>
  <text x="620" y="150" text-anchor="middle" font-size="7" fill="#a78bfa">AI-first design ◉◉</text>

  <rect x="695" y="60" width="105" height="100" rx="5" fill="#141b2d" stroke="#10b981" stroke-width="1"/>
  <circle cx="747" cy="78" r="10" fill="none" stroke="#10b981" stroke-width="1.5"/>
  <text x="747" y="82" text-anchor="middle" font-size="10" fill="#10b981" font-weight="700">6</text>
  <text x="747" y="100" text-anchor="middle" font-size="9.5" fill="#e2e8f0" font-weight="600">AI-Generable</text>
  <text x="747" y="114" text-anchor="middle" font-size="7" fill="#64748b">Intent → Code</text>
  <text x="747" y="126" text-anchor="middle" font-size="7" fill="#64748b">Human validates</text>
  <text x="747" y="150" text-anchor="middle" font-size="7" fill="#10b981">Full co-pilot ◉◉◉</text>

  <!-- Key insight -->
  <rect x="90" y="180" width="640" height="40" rx="5" fill="#141b2d" stroke="#22d3ee" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="410" y="198" text-anchor="middle" font-size="10" fill="#22d3ee" font-weight="600">Stages 1→3 require classical books. Stages 4→6 require the SAME principles</text>
  <text x="410" y="212" text-anchor="middle" font-size="9" fill="#94a3b8">PLUS structured metadata (.ai/, ADR, OpenAPI) that AI agents can consume.</text>

  <!-- Bottom labels -->
  <rect x="140" y="235" width="200" height="22" rx="4" fill="none" stroke="#94a3b8" stroke-width="0.8" stroke-dasharray="3,3"/>
  <text x="240" y="250" text-anchor="middle" font-size="8" fill="#94a3b8">Classical Books 经典书籍</text>
  <text x="410" y="250" text-anchor="middle" font-size="12" fill="#64748b">+</text>
  <rect x="480" y="235" width="200" height="22" rx="4" fill="none" stroke="#22d3ee" stroke-width="0.8" stroke-dasharray="3,3"/>
  <text x="580" y="250" text-anchor="middle" font-size="8" fill="#22d3ee">AI Context Engineering</text>

  <text x="410" y="274" text-anchor="middle" font-size="8" fill="#64748b">Source: Clean Code · Code Complete · Philosophy of SW Design · Art of Readable Code</text>
</svg>
