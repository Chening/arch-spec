<svg viewBox="0 0 820 300" xmlns="http://www.w3.org/2000/svg" style="font-family:'JetBrains Mono',monospace;">
  <title>L4 — Engineering Culture: Leading the AI Transition</title>
  <desc>Three-pillar transformation framework for AI-augmented engineering culture: Lean Manifesto (let machines repeat), Team Topologies (AI Platform Team), and Knowledge System (RAG-ready KB).</desc>

  <rect width="820" height="300" rx="8" fill="#0a0e17"/>

  <text x="410" y="24" text-anchor="middle" font-size="11" fill="#f43f5e" font-weight="700" letter-spacing="1">L4 ENGINEERING CULTURE — LEADING THE TRANSITION</text>
  <text x="410" y="42" text-anchor="middle" font-size="9" fill="#64748b">From managing people who write software → leading a human-AI system that produces software</text>

  <!-- 4.1 Lean Manifesto -->
  <rect x="30" y="60" width="240" height="190" rx="6" fill="#141b2d" stroke="#f43f5e" stroke-width="1.2"/>
  <text x="150" y="82" text-anchor="middle" font-size="10" fill="#f43f5e" font-weight="700">4.1 LEAN MANIFESTO</text>
  <text x="150" y="98" text-anchor="middle" font-size="8" fill="#64748b">让机器重复，让人类进化</text>

  <rect x="50" y="110" width="200" height="26" rx="4" fill="#0f1420" stroke="#1e2a45" stroke-width="0.5"/>
  <text x="150" y="127" text-anchor="middle" font-size="8" fill="#22d3ee">Human × Machine Matrix</text>
  <rect x="50" y="142" width="200" height="26" rx="4" fill="#0f1420" stroke="#1e2a45" stroke-width="0.5"/>
  <text x="150" y="159" text-anchor="middle" font-size="8" fill="#a78bfa">Objective-Validation Protocol</text>
  <rect x="50" y="174" width="200" height="26" rx="4" fill="#0f1420" stroke="#1e2a45" stroke-width="0.5"/>
  <text x="150" y="191" text-anchor="middle" font-size="8" fill="#f97316">AI-Augmented Metrics</text>
  <rect x="50" y="206" width="200" height="26" rx="4" fill="#0f1420" stroke="#1e2a45" stroke-width="0.5"/>
  <text x="150" y="223" text-anchor="middle" font-size="8" fill="#10b981">10x Amplified Team</text>

  <!-- 4.2 Team Topologies -->
  <rect x="290" y="60" width="240" height="190" rx="6" fill="#141b2d" stroke="#f43f5e" stroke-width="1.2"/>
  <text x="410" y="82" text-anchor="middle" font-size="10" fill="#f43f5e" font-weight="700">4.2 TEAM TOPOLOGIES</text>
  <text x="410" y="98" text-anchor="middle" font-size="8" fill="#64748b">AI增强组织</text>

  <rect x="310" y="110" width="200" height="26" rx="4" fill="#0f1420" stroke="#22d3ee" stroke-width="0.8"/>
  <text x="410" y="127" text-anchor="middle" font-size="8" fill="#22d3ee" font-weight="600">AI Platform Team (NEW)</text>
  <rect x="310" y="142" width="200" height="26" rx="4" fill="#0f1420" stroke="#1e2a45" stroke-width="0.5"/>
  <text x="410" y="159" text-anchor="middle" font-size="8" fill="#a78bfa">Cognitive Load Reduction</text>
  <rect x="310" y="174" width="200" height="26" rx="4" fill="#0f1420" stroke="#1e2a45" stroke-width="0.5"/>
  <text x="410" y="191" text-anchor="middle" font-size="8" fill="#f97316">Conway's Law + AI Nodes</text>
  <rect x="310" y="206" width="200" height="26" rx="4" fill="#0f1420" stroke="#1e2a45" stroke-width="0.5"/>
  <text x="410" y="223" text-anchor="middle" font-size="8" fill="#10b981">Smaller Teams, Bigger Impact</text>

  <!-- 4.3 Knowledge System -->
  <rect x="550" y="60" width="240" height="190" rx="6" fill="#141b2d" stroke="#f43f5e" stroke-width="1.2"/>
  <text x="670" y="82" text-anchor="middle" font-size="10" fill="#f43f5e" font-weight="700">4.3 KNOWLEDGE SYSTEM</text>
  <text x="670" y="98" text-anchor="middle" font-size="8" fill="#64748b">个人知识体系</text>

  <rect x="570" y="110" width="200" height="26" rx="4" fill="#0f1420" stroke="#1e2a45" stroke-width="0.5"/>
  <text x="670" y="127" text-anchor="middle" font-size="8" fill="#22d3ee">Knowledge Tech Tree</text>
  <rect x="570" y="142" width="200" height="26" rx="4" fill="#0f1420" stroke="#1e2a45" stroke-width="0.5"/>
  <text x="670" y="159" text-anchor="middle" font-size="8" fill="#a78bfa">Dialog with Books via AI</text>
  <rect x="570" y="174" width="200" height="26" rx="4" fill="#0f1420" stroke="#1e2a45" stroke-width="0.5"/>
  <text x="670" y="191" text-anchor="middle" font-size="8" fill="#f97316">RAG-Ready Knowledge Base</text>
  <rect x="570" y="206" width="200" height="26" rx="4" fill="#0f1420" stroke="#1e2a45" stroke-width="0.5"/>
  <text x="670" y="223" text-anchor="middle" font-size="8" fill="#10b981">AI-Curated Learning Path</text>

  <!-- Bottom insight -->
  <rect x="80" y="265" width="660" height="28" rx="5" fill="#141b2d" stroke="#f43f5e" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="410" y="283" text-anchor="middle" font-size="9" fill="#f43f5e" font-weight="600">The goal is not to use AI — the goal is to build better software with better teams</text>
</svg>
