<svg viewBox="0 0 820 320" xmlns="http://www.w3.org/2000/svg" style="font-family:'JetBrains Mono',monospace;">
  <title>L3 — Infrastructure Stack: The Machine That Watches the Machine</title>
  <desc>Four-layer infrastructure stack showing CI/CD, networking, IaC, and observability with AI intelligence layer running through all four.</desc>

  <rect width="820" height="320" rx="8" fill="#0a0e17"/>

  <text x="410" y="24" text-anchor="middle" font-size="11" fill="#10b981" font-weight="700" letter-spacing="1">L3 INFRASTRUCTURE — THE MACHINE THAT WATCHES THE MACHINE</text>

  <!-- AI Intelligence Layer (vertical) -->
  <rect x="680" y="50" width="110" height="230" rx="6" fill="#141b2d" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="735" y="75" text-anchor="middle" font-size="9" fill="#22d3ee" font-weight="700">AI LAYER</text>
  <text x="735" y="110" text-anchor="middle" font-size="7" fill="#94a3b8">Review gates</text>
  <text x="735" y="130" text-anchor="middle" font-size="7" fill="#94a3b8">Traffic routing</text>
  <text x="735" y="150" text-anchor="middle" font-size="7" fill="#94a3b8">Drift detection</text>
  <text x="735" y="170" text-anchor="middle" font-size="7" fill="#94a3b8">Anomaly detect</text>
  <text x="735" y="190" text-anchor="middle" font-size="7" fill="#94a3b8">Auto-runbooks</text>
  <text x="735" y="210" text-anchor="middle" font-size="7" fill="#94a3b8">Cost optimize</text>
  <text x="735" y="235" text-anchor="middle" font-size="7" fill="#22d3ee">NL queries</text>
  <text x="735" y="255" text-anchor="middle" font-size="7" fill="#22d3ee">Predictive ops</text>
  <text x="735" y="270" text-anchor="middle" font-size="7" fill="#22d3ee">Self-healing</text>

  <!-- 3.1 CI/CD -->
  <rect x="40" y="50" width="620" height="48" rx="5" fill="#141b2d" stroke="#10b981" stroke-width="1.2"/>
  <text x="60" y="72" font-size="10" fill="#10b981" font-weight="700">3.1 CI/CD AS ARCHITECTURE</text>
  <text x="60" y="88" font-size="7" fill="#94a3b8">Pipeline immune system · AI review gates · DORA+AI prediction · Nightly 6-dimension audit</text>
  <text x="550" y="78" font-size="7" fill="#64748b">Continuous Delivery · Accelerate</text>

  <!-- 3.2 Network -->
  <rect x="40" y="108" width="620" height="48" rx="5" fill="#141b2d" stroke="#10b981" stroke-width="1.2"/>
  <text x="60" y="130" font-size="10" fill="#10b981" font-weight="700">3.2 DNS, LOAD BALANCING &amp; MULTI-DC</text>
  <text x="60" y="146" font-size="7" fill="#94a3b8">Nervous system · AI traffic routing · Predictive scaling · Chaos+AI · NL telemetry</text>
  <text x="550" y="136" font-size="7" fill="#64748b">SRE Book · Release It!</text>

  <!-- 3.3 IaC -->
  <rect x="40" y="166" width="620" height="48" rx="5" fill="#141b2d" stroke="#10b981" stroke-width="1.2"/>
  <text x="60" y="188" font-size="10" fill="#10b981" font-weight="700">3.3 INFRASTRUCTURE AS CODE</text>
  <text x="60" y="204" font-size="7" fill="#94a3b8">Intent-based infra · AI drift detection · AI cost optimization · Architecture→IaC generation</text>
  <text x="550" y="194" font-size="7" fill="#64748b">IaC · Terraform · K8s</text>

  <!-- 3.4 Observability -->
  <rect x="40" y="224" width="620" height="48" rx="5" fill="#141b2d" stroke="#10b981" stroke-width="1.2"/>
  <text x="60" y="246" font-size="10" fill="#10b981" font-weight="700">3.4 OBSERVABILITY STACK</text>
  <text x="60" y="262" font-size="7" fill="#94a3b8">Signal pyramid · NL log analysis · ML anomaly detection · AI-gen runbooks · AI component metrics</text>
  <text x="550" y="252" font-size="7" fill="#64748b">Observability Eng · SRE</text>

  <!-- Connections to AI layer -->
  <line x1="660" y1="74" x2="680" y2="74" stroke="#22d3ee" stroke-width="0.8" stroke-dasharray="3,3"/>
  <line x1="660" y1="132" x2="680" y2="132" stroke="#22d3ee" stroke-width="0.8" stroke-dasharray="3,3"/>
  <line x1="660" y1="190" x2="680" y2="190" stroke="#22d3ee" stroke-width="0.8" stroke-dasharray="3,3"/>
  <line x1="660" y1="248" x2="680" y2="248" stroke="#22d3ee" stroke-width="0.8" stroke-dasharray="3,3"/>

  <!-- Bottom -->
  <rect x="100" y="286" width="620" height="26" rx="5" fill="#141b2d" stroke="#10b981" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="410" y="303" text-anchor="middle" font-size="9" fill="#10b981" font-weight="600">Core Shift: from infra humans operate → infra AI operates under human supervision</text>
</svg>
